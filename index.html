  };
function csvUrl(gid) {
  return CSV_URLS[gid] || '';
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') inQ = !inQ;
      else if (line[i] === ',' && !inQ) { vals.push(cur); cur = ''; }
      else cur += line[i];
    }
    vals.push(cur);
    const obj = {};
    headers.forEach((h,i) => obj[h] = (vals[i]||'').replace(/^"|"$/g,'').trim());
    return obj;
  }).filter(r => Object.values(r).some(v=>v));
}

function getVal(row, patterns) {
  const keys = Object.keys(row);
  for (const p of patterns) {
    const k = keys.find(k => k.toLowerCase().includes(p.toLowerCase()));
    if (k && row[k]) return row[k];
  }
  return '';
}

function parseNPS(v) {
  if (!v) return null;
  const n = parseFloat(String(v).replace(',','.'));
  return isNaN(n) ? null : Math.round(Math.min(10, Math.max(0, n)));
}

function parseSat(v) {
  if (!v) return null;
  const s = String(v).replace(/^\d\.\s*/,'').toLowerCase();
  // Order matters: check longer/more specific phrases first
  // to avoid 'de acuerdo' matching inside 'ni de acuerdo ni en desacuerdo'
  if (s.includes('ni de acuerdo ni en desacuerdo')) return 3;
  if (s.includes('muy de acuerdo')) return 5;
  if (s.includes('muy en desacuerdo')) return 1;
  if (s.includes('de acuerdo')) return 4;
  if (s.includes('en desacuerdo')) return 2;
  const n = parseFloat(String(v).replace(',','.'));
  return isNaN(n) ? null : Math.min(5, Math.max(1, n));
}

function parseVolveria(v) {
  if (!v || v.trim() === '') return null;
  const s = String(v).toLowerCase().trim()
    .replace(/í/g,'i').replace(/á/g,'a'); // normalize accents
  if (s === 'si' || s === 'yes' || s === '1' || s === 'true') return true;
  if (s === 'no' || s === '0' || s === 'false') return false;
  // Handle numeric (e.g. percentage stored as number)
  const n = parseFloat(s);
  if (!isNaN(n)) return n > 50;
  return null;
}

function normCurso(v) {
  if (!v) return '';
  var s = v.trim()
    .replace(/í/g,'i').replace(/ì/g,'i')
    .replace(/á/g,'a').replace(/à/g,'a')
    .replace(/é/g,'e').replace(/è/g,'e')
    .replace(/ó/g,'o').replace(/ò/g,'o')
    .replace(/ú/g,'u').replace(/ù/g,'u')
    .replace(/ñ/g,'n')
    .toLowerCase();
  // Explicit mapping for all known curso names
  var MAP = {
    'pre kinder':'Pre Kinder', 'prekinder':'Pre Kinder', 'pre-kinder':'Pre Kinder',
    'kinder':'Kinder', 'kindergarten':'Kinder',
    'primero basico':'Primero Basico', '1 basico':'Primero Basico', '1ro basico':'Primero Basico', '1° basico':'Primero Basico',

    'tercero basico':'Tercero Basico', '3 basico':'Tercero Basico', '3ro basico':'Tercero Basico', '3° basico':'Tercero Basico',
    'cuarto basico':'Cuarto Basico', '4 basico':'Cuarto Basico', '4to basico':'Cuarto Basico', '4° basico':'Cuarto Basico',
    'quinto basico':'Quinto Basico', '5 basico':'Quinto Basico', '5to basico':'Quinto Basico', '5° basico':'Quinto Basico',
    'sexto basico':'Sexto Basico', '6 basico':'Sexto Basico', '6to basico':'Sexto Basico', '6° basico':'Sexto Basico',
    'septimo basico':'Septimo Basico', '7 basico':'Septimo Basico', '7mo basico':'Septimo Basico', '7° basico':'Septimo Basico',
    'octavo basico':'Octavo Basico', '8 basico':'Octavo Basico', '8vo basico':'Octavo Basico', '8° basico':'Octavo Basico',
    'primero medio':'Primero Medio', '1 medio':'Primero Medio', '1ro medio':'Primero Medio', '1° medio':'Primero Medio',
    'segundo medio':'Segundo Medio', '2 medio':'Segundo Medio', '2do medio':'Segundo Medio', '2° medio':'Segundo Medio',
    'tercero medio':'Tercero Medio', '3 medio':'Tercero Medio', '3ro medio':'Tercero Medio', '3° medio':'Tercero Medio',
    'cuarto medio':'Cuarto Medio', '4 medio':'Cuarto Medio', '4to medio':'Cuarto Medio', '4° medio':'Cuarto Medio'
  };
  return MAP[s] || s;
}

async function loadTab(tab) {
  try {
    const res = await fetch(csvUrl(tab.gid));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (!rows.length) return [];
    const headers = Object.keys(rows[0]);

    function stripAccents(s) {
      return s.toLowerCase()
        .replace(/[áàä]/g,'a').replace(/[éèë]/g,'e')
        .replace(/[íìï]/g,'i').replace(/[óòö]/g,'o')
        .replace(/[úùü]/g,'u').replace(/ñ/g,'n')
        .replace(/[^a-z0-9 ]/g,' ').replace(/ +/g,' ').trim();
    }
    var normHeaders = headers.map(stripAccents);
    function findCol(kws) {
      for (var ki = 0; ki < kws.length; ki++) {
        var kw = stripAccents(kws[ki]);
        for (var hi = 0; hi < normHeaders.length; hi++) {
          if (normHeaders[hi].indexOf(kw) >= 0) return hi;
        }
      }
      return -1;
    }

    var colegioIdx = findCol(['colegio']);
    var npsIdx     = findCol(['nps']);
    var satIdx     = findCol(['satisfaccion general','satisfacci']);
    var volIdx     = findCol(['volveria a participar','volveria','volver']);
    var cursoIdx   = findCol(['curso']);
    var mejoraIdx  = findCol(['como podria mejorar','podria mejorar','mejorar']);

    var dims = DIM_COLS[tab.name] || [];
    var dimIdxs = dims.map(function(d) { return findCol([d.kw]); });

    function byIdx(row, idx) {
      if (idx < 0) return '';
      var vals = Object.values(row);
      return idx < vals.length ? (vals[idx] || '') : '';
    }

    return rows.map(function(row) {
      var dimVals = {};
      dims.forEach(function(d, i) {
        var raw = byIdx(row, dimIdxs[i]);
        if (!raw) return;
        if (d.type === 'bool') {
          var s = raw.toLowerCase().trim();
          if (s === 'sí' || s === 'si' || s === 'yes') dimVals[d.label] = 1;
          else if (s === 'no') dimVals[d.label] = 0;
        } else {
          // avg and pct both store raw 1-5 numeric value; pct aggregation happens in render
          var n = parseSat(raw);
          if (n !== null) dimVals[d.label] = n;
        }
      });
      return {
        instancia: tab.name,
        color:     tab.color,
        colegio:   byIdx(row, colegioIdx),
        nps:       parseNPS(byIdx(row, npsIdx)),
        sat:       parseSat(byIdx(row, satIdx)),
        volveria:  parseVolveria(byIdx(row, volIdx)),
        curso:     (function() {
          var v = byIdx(row, cursoIdx);
          if (!v) return '';
          v = v.trim();
          // Reject Likert scale values (start with digit + dot)
          if (/^\d\./.test(v)) return '';
          // Reject free text (too long, contains commas/semicolons)
          if (v.length > 40 || v.split(' ').length > 6) return '';
          if (/[,;]/.test(v)) return '';
          // Normalize capitalization and accents for consistency
          return normCurso(v);
        })(),
        dims:      dimVals,
        mejora:    byIdx(row, mejoraIdx)
      };
    }).filter(function(r) { return r.colegio; });

  } catch(e) {
    console.warn('Error cargando', tab.name, e.message);
    return [];
  }
}

async function runAI() {
  const col = document.getElementById('aiColegio') ? document.getElementById('aiColegio').value : '';
  const inst = document.getElementById('aiInstancia') ? document.getElementById('aiInstancia').value : '';
  const filtered = getFiltered().filter(function(r) {
    return (!col || r.colegio === col) && (!inst || r.instancia === inst);
  });
  const comments = filtered.map(function(r){ return r.mejora; })
    .filter(function(c){ return c && c.trim().length > 8; })
    .map(function(c){ return c.trim(); });

  if (!comments.length) {
    document.getElementById('aiStrengths').innerHTML = '<span class="ai-placeholder">Sin comentarios para el filtro seleccionado.</span>';
    document.getElementById('aiImprovements').innerHTML = '<span class="ai-placeholder">Sin comentarios para el filtro seleccionado.</span>';
    return;
  }

  const btn = document.querySelector('.ai-btn');
  btn.disabled = true;
  btn.textContent = 'Analizando...';
  document.getElementById('aiStrengths').innerHTML = '<div class="ai-loading">Analizando ' + comments.length + ' comentarios...</div>';
  document.getElementById('aiImprovements').innerHTML = '<div class="ai-loading">...</div>';

  // ── TOPIC FREQUENCY ANALYSIS ─────────────────────────────────────────────
  // Define topic clusters with keywords (context-aware)
  const TOPICS = {
    mejoras: [
      { id: 'tiempo',     kws: ['tiempo','hora','duración','durar','extender','más largo','corto'] },
      { id: 'horario',    kws: ['horario','viernes','mañana','tarde','dia','día','fecha'] },
      { id: 'practico',   kws: ['práctico','práctica','ejercicio','aplicar','real','caso','ejemplo'] },
      { id: 'online',     kws: ['online','virtual','zoom','presencial','remoto'] },
      { id: 'profundidad',kws: ['profund','detalle','más información','más contenido','superficial','poco'] },
      { id: 'frecuencia', kws: ['frecuencia','más seguido','más veces','más talleres','más encuentros'] },
      { id: 'dinamico',   kws: ['dinámico','dinámica','entretenido','participativo','aburrido','monótono'] },
      { id: 'mejorar_rel',kws: ['mejorar la relación','comunicación','diálogo'] },
    ],
    fortalezas: [
      { id: 'excelente',  kws: ['excelente','muy bueno','muy bien','óptimo','perfecto','genial','fantástico'] },
      { id: 'herramientas',kws: ['herramienta','consejos','útil','práctico','sirve','ayuda'] },
      { id: 'relator',    kws: ['relator','relatora','profesora','profesor','expositor','facilitador'] },
      { id: 'contenido',  kws: ['contenido','tema','información','aprendizaje','aprend'] },
      { id: 'ambiente',   kws: ['ambiente','acogedor','cómodo','confort','espacio'] },
      { id: 'familia',    kws: ['familia','hijos','hijo','padres','crianza'] },
      { id: 'recomiendo', kws: ['recomend','comparte','todos deberian','ojalá más'] },
      { id: 'nada',       kws: ['nada que mejorar','nada más','sin comentarios','está bien','todo bien','todo excelente'] },
    ]
  };

  // Score each comment for each topic
  function scoreComment(text, topicKws) {
    var tl = text.toLowerCase();
    return topicKws.reduce(function(s, kw) { return s + (tl.indexOf(kw) >= 0 ? 1 : 0); }, 0);
  }

  // Strict classifier: only positive if it expresses satisfaction with NO suggestion language
  function isPrimaryPositive(text) {
    var tl = text.toLowerCase();
    // Explicit "nothing to improve" → always positive
    if (/nada (que|a) mejorar|todo (bien|excelente|bueno|perfecto|correcto)|sin (sugerencia|nada|comentario)|no (hay|tengo) (nada|sugerencia)|está (muy )?(bien|perfecto|excelente)|ningun(a)? (cambio|mejora|sugerencia)/i.test(text)) return true;
    // Any suggestion language → mejora (even if mixed with positive words)
    if (/m[aá]s|extender|agregar|incluir|podr[ií](an|a)|sugiero|ser[ií]a bueno|necesita|falt[oó]|falta|aumentar|ampliar|mejor(ar|ando)|cambiar|a[ñn]adir|quiz[aá]s|tal vez|ojal[aá]|quisiera|me gustar[ií]a|se podr[ií]a|ayudar[ií]a|deber[ií]an|hab[ií]a que|propongo|propuesta/i.test(text)) return false;
    // Only keep as positive if it has clear positive words AND nothing ambiguous
    var hasClearPositive = /excelente|muy bueno|muy bien|[oó]ptimo|perfecto|genial|fant[aá]stico|incre[ií]ble|maravill|encant[oó]|estuvo bien|bien organizado|muy claro|muy [uú]til|muy din[aá]mico|me gust[oó] mucho|lo recomiendo/i.test(text);
    return hasClearPositive;
  }

  // Group comments into positive / improvement
  var positivos = [];
  var mejoras = [];
  comments.forEach(function(c) {
    if (isPrimaryPositive(c)) positivos.push(c);
    else mejoras.push(c);
  });

  // Find most representative comments per topic
  function topPerTopic(commentList, topicList, maxPerTopic, maxTotal) {
    var used = new Set();
    var results = [];
    topicList.forEach(function(topic) {
      if (results.length >= maxTotal) return;
      var best = null, bestScore = 0;
      commentList.forEach(function(c) {
        if (used.has(c)) return;
        var s = scoreComment(c, topic.kws);
        if (s > bestScore || (s === bestScore && best && c.length < best.length)) {
          bestScore = s; best = c;
        }
      });
      if (best && bestScore > 0) {
        used.add(best);
        results.push(best);
      }
    });
    // Fill remaining slots with shortest unselected comments (most concise = clearest)
    commentList.forEach(function(c) {
      if (results.length >= maxTotal) return;
      if (!used.has(c) && c.length < 120) {
        used.add(c);
        results.push(c);
      }
    });
    return results.slice(0, maxTotal);
  }

  var topPos = topPerTopic(positivos, TOPICS.fortalezas, 2, 5);
  var topMej = topPerTopic(mejoras, TOPICS.mejoras, 2, 5);

  // Fallback if one side is empty
  if (!topPos.length) topPos = ['No se identificaron comentarios positivos en esta muestra.'];
  if (!topMej.length) topMej = ['No se identificaron oportunidades de mejora en esta muestra.'];

  // Add count info
  var posLabel = positivos.length > 0 ? ' <small style="font-weight:400;opacity:.6">(' + positivos.length + ' comentarios positivos)</small>' : '';
  var mejLabel = mejoras.length > 0 ? ' <small style="font-weight:400;opacity:.6">(' + mejoras.length + ' sugerencias)</small>' : '';

  document.querySelector('.ai-col.strengths .ai-col-title').innerHTML = '&#x2705; FORTALEZAS DESTACADAS' + posLabel;
  document.querySelector('.ai-col.improvements .ai-col-title').innerHTML = '&#x1F527; OPORTUNIDADES DE MEJORA' + mejLabel;

  document.getElementById('aiStrengths').innerHTML =
    topPos.map(function(f){ return '<div class="ai-item">' + f + '</div>'; }).join('');
  document.getElementById('aiImprovements').innerHTML =
    topMej.map(function(m){ return '<div class="ai-item">' + m + '</div>'; }).join('');

  btn.disabled = false;
  btn.innerHTML = '&#x2728; Analizar comentarios';
}

}

const CURSO_ORDER = [
  'Pre Kinder','Kinder',
  'Primero Basico','Segundo Basico','Tercero Basico','Cuarto Basico',
  'Quinto Basico','Sexto Basico','Septimo Basico','Octavo Basico',
  'Primero Medio','Segundo Medio','Tercero Medio','Cuarto Medio'
];
function sortCursos(cursos) {
  return cursos.slice().sort(function(a, b) {
    var ia = CURSO_ORDER.indexOf(a);
    var ib = CURSO_ORDER.indexOf(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b, 'es');
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });
}

function populateFilters() {
  // Colegios — multi-select checkboxes
  const colegios = [...new Set(allRows.map(r=>r.colegio).filter(Boolean))].sort();
  const list = document.getElementById('ms-list');
  list.innerHTML = '';
  colegios.forEach(c => {
    const lbl = document.createElement('label');
    lbl.className = 'ms-item';
    lbl.innerHTML = '<input type="checkbox" value="' + c.replace(/"/g,'&quot;') + '" onchange="updateColegioLabel(); render();"> ' + c;
    list.appendChild(lbl);
  });
  document.getElementById('ms-all').checked = true;

  const set = (id, vals) => {
    const el = document.getElementById(id);
    const cur = el.value;
    while (el.options.length > 1) el.remove(1);
    vals.forEach(v => { if (!v) return; const o = document.createElement('option'); o.value=v; o.textContent=v; el.appendChild(o); });
    if (vals.includes(cur)) el.value = cur;
  };
  set('fInstancia', [...new Set(allRows.map(r=>r.instancia).filter(Boolean))].sort());
  set('fCurso', sortCursos([...new Set(allRows.map(r=>r.curso).filter(Boolean))]).filter(Boolean));
  ['fInstancia','fCurso'].forEach(id => document.getElementById(id).onchange = render);
}

  );

function calcNPS(rows) {
  const v = rows.filter(r=>r.nps!==null);
  if (!v.length) return {nps:null,pPct:0,nPct:0,dPct:0,n:0};
  const p=v.filter(r=>r.nps>=9).length, ne=v.filter(r=>r.nps>=7&&r.nps<=8).length, d=v.filter(r=>r.nps<=6).length;
  return {nps:Math.round((p-d)/v.length*100), pPct:Math.round(p/v.length*100), nPct:Math.round(ne/v.length*100), dPct:Math.round(d/v.length*100), n:v.length};
}
function calcSat(rows) { const v=rows.filter(r=>r.sat!==null); return v.length ? v.reduce((s,r)=>s+r.sat,0)/v.length : null; }
function calcVol(rows) {
  var answered = rows.filter(function(r){ return r.volveria !== null; });
  if (!answered.length) return null;
  return answered.filter(function(r){ return r.volveria === true; }).length / answered.length * 100;
}

function npsColor(n) { return n===null?'#999':n>=50?'#93C049':n>=0?'#F28E35':'#D8162D'; }
function npsLabel(n) { return n===null?'Sin datos':n>=50?'Excelente':n>=0?'Bueno':'Por mejorar'; }
function pillCls(n) { return n===null?'pill':n>=50?'pill pill-g':n>=0?'pill pill-a':'pill pill-r'; }

function destroyAll() { Object.keys(charts).forEach(id=>{try{charts[id].destroy();}catch(e){}delete charts[id];}); }
function mkChart(id,type,data,opts) {

  if(charts[id]){try{charts[id].destroy();}catch(e){} delete charts[id];}
  charts[id]=new Chart(el,{type,data,options:opts});
}

function render() {
  destroyAll();
  const rows = getFiltered();
  if (!rows.length) {
    document.getElementById('mainContent').innerHTML = '<div class="loading-wrap"><p>Sin datos para los filtros seleccionados.</p></div>';
    return;
  }

  const g = calcNPS(rows), sat = calcSat(rows), vol = calcVol(rows);
  const byInst = {};
  SAT_TABS.forEach(t => {
    const r = rows.filter(x=>x.instancia===t.name);
    if (r.length) byInst[t.name] = {...calcNPS(r), sat:calcSat(r), vol:calcVol(r), color:t.color, n:r.length};
  });
  const instKeys = Object.keys(byInst);
  const schoolSet = [...new Set(rows.map(r=>r.colegio).filter(Boolean))].sort();
  const bySchool = {};
  schoolSet.forEach(c => { const r=rows.filter(x=>x.colegio===c); bySchool[c]={...calcNPS(r),sat:calcSat(r),vol:calcVol(r),n:r.length}; });
  const hInst = Math.max(120, instKeys.length*50+40);
  const hSchool = Math.max(120, schoolSet.length*50+40);

  // ── BUILD COURSE TABLE HTML ────────────────────────────────────────────────
  const cursoSet = sortCursos([...new Set(rows.map(r=>r.curso).filter(Boolean))]);
  let cursoTableHtml = '';
  if (cursoSet.length > 1) {
    const byCurso = {};
    cursoSet.forEach(c => {
      const r = rows.filter(x=>x.curso===c);
      byCurso[c] = {...calcNPS(r), sat:calcSat(r), vol:calcVol(r), n:r.length};
    });
    const hCurso = Math.max(100, cursoSet.length*44+40);
    cursoTableHtml = `
    <div class="section-title">Por curso</div>
    <div class="card" style="margin-bottom:16px">
      <table class="school-table">
        <thead><tr><th>Curso</th><th>NPS</th><th>Categoría</th><th>Sat. gral.</th><th>Volvería</th><th>Resp.</th></tr></thead>
        <tbody>
          ${cursoSet.map(c=>{const d=byCurso[c];return`
            <tr>
              <td style="font-weight:500">${c}</td>
              <td style="color:${npsColor(d.nps)};font-weight:600">${d.nps!==null?d.nps:'—'}</td>
              <td><span class="${pillCls(d.nps)}">${npsLabel(d.nps)}</span></td>
              <td>${d.sat!==null?d.sat.toFixed(1)+' / 5':'—'}</td>
              <td>${d.vol!==null?Math.round(d.vol)+'%':'—'}</td>
              <td style="color:#999">${d.n}</td>
            </tr>`;}).join('')}
        </tbody>
      </table>
    </div>`;
  }

  // ── BUILD DIMS HTML ──────────────────────────────────────────────────────
  let dimsHtml = '';
  const instWithDims = instKeys.filter(k => DIM_COLS[k] && DIM_COLS[k].length > 0);
  if (instWithDims.length > 0) {
    dimsHtml = '<div class="section-title" style="margin-top:4px">Dimensiones espec\u00edficas por instancia</div><div class="dims-grid">';
    instWithDims.forEach(instName => {
      const instRows = rows.filter(r => r.instancia === instName);
      const dims = DIM_COLS[instName] || [];
      const tabInfo = SAT_TABS.find(t => t.name === instName);
      const color = tabInfo ? tabInfo.color : '#888';
      let dimRowsHtml = '';
      dims.forEach(dim => {
        const vals = instRows.map(r => r.dims[dim.label]).filter(v => v !== undefined && v !== null);
        if (!vals.length) return;
        let display, barPct;
        if (dim.type === 'bool') {
          const pct = Math.round(vals.filter(v => v===1).length / vals.length * 100);
          display = pct + '%'; barPct = pct;
        } else if (dim.type === 'pct') {
          const pct = Math.round(vals.filter(v => v >= 4).length / vals.length * 100);
          display = pct + '%'; barPct = pct;
        } else {
          const avg = vals.reduce((s,v)=>s+v,0)/vals.length;
          display = avg.toFixed(1); barPct = avg/5*100;
        }
        dimRowsHtml += '<div class="dim-row"><span class="dim-label">'+dim.label+'</span><div class="dim-bar-wrap"><div class="dim-bar" style="width:'+barPct.toFixed(1)+'%;background:'+color+'"></div></div><span class="dim-val">'+display+'</span></div>';
      });
      if (dimRowsHtml) dimsHtml += '<div class="dim-section"><div class="dim-title" style="color:'+color+'">'+instName.toUpperCase()+'</div>'+dimRowsHtml+'</div>';
    });
    dimsHtml += '</div>';
  }

  // ── BUILD AI SECTION HTML ────────────────────────────────────────────────
  const instOpts = '<option value="">Todas las instancias</option>'+instKeys.map(k=>'<option value="'+k+'">'+k+'</option>').join('');
  const aiColegioOpts = '<option value="">Todos los colegios</option>'+schoolSet.map(c=>'<option value="'+c.replace(/"/g,'&quot;')+'">'+c+'</option>').join('');
  const aiHtml = '<div class="ai-section"><div class="ai-header"><h3>&#x1F4AC; Análisis de Comentarios</h3><div class="ai-controls"><select id="aiColegio">'+aiColegioOpts+'</select><select id="aiInstancia">'+instOpts+'</select><button class="btn" onclick="debugDims()" style="font-size:11px;padding:4px 10px">Debug</button><button class="ai-btn" onclick="runAI()">&#x2728; Analizar</button></div></div><div class="ai-cols"><div class="ai-col strengths"><div class="ai-col-title">&#x2705; FORTALEZAS DESTACADAS</div><div id="aiStrengths" class="ai-placeholder">Selecciona filtros y presiona Analizar</div></div><div class="ai-col improvements"><div class="ai-col-title">&#x1F527; OPORTUNIDADES DE MEJORA</div><div id="aiImprovements" class="ai-placeholder">Selecciona filtros y presiona Analizar</div></div></div></div>';

  // ── RENDER ALL HTML ──────────────────────────────────────────────────────
  document.getElementById('mainContent').innerHTML = `
    <div class="section-title">Indicadores generales</div>
    <div class="kpi-grid">
      <div class="kpi accent">
        <div class="lbl">NPS general</div>
        <div class="val" style="color:${npsColor(g.nps)}">${g.nps!==null?g.nps:'—'}</div>
        <div class="sub">${npsLabel(g.nps)} · ${g.n} respuestas con NPS</div>
        <div class="nps-bar"><div class="b-p" style="width:${g.pPct}%"></div><div class="b-n" style="width:${g.nPct}%"></div><div class="b-d" style="width:${g.dPct}%"></div></div>
        <div class="nps-legend">
          <span style="color:#93C049">▮ Promotores ${g.pPct}%</span>
          <span style="color:#F28E35">▮ Neutros ${g.nPct}%</span>
          <span style="color:#D8162D">▮ Detractores ${g.dPct}%</span>
        </div>
      </div>
      <div class="kpi">
        <div class="lbl">Satisfacci\u00f3n general</div>
        <div class="val">${sat!==null?sat.toFixed(1):'—'}<span style="font-size:14px;color:#999;font-weight:400"> / 5</span></div>
        <div class="sub">${sat!==null?Math.round(sat/5*100)+'% del m\u00e1ximo posible':'Sin datos'}</div>
      </div>
      <div class="kpi">
        <div class="lbl">Volver\u00eda a participar</div>
        <div class="val">${vol!==null?Math.round(vol)+'%':'—'}</div>
        <div class="sub">${vol!==null?'de los encuestados':'Sin datos'}</div>
      </div>
      <div class="kpi">
        <div class="lbl">Total respuestas</div>
        <div class="val">${rows.length}</div>
        <div class="sub">${instKeys.length} instancias · ${schoolSet.length} colegios</div>
      </div>
    </div>

    <div class="section-title">Por instancia</div>
    <div class="inst-grid">
      ${instKeys.map(name=>{const d=byInst[name];return`
        <div class="inst-card">
          <div class="inst-header"><span class="inst-dot" style="background:${d.color}"></span>${name}</div>
          <div class="inst-nps" style="color:${npsColor(d.nps)}">${d.nps!==null?d.nps:'—'} <span style="font-size:13px;font-weight:400;color:#999">NPS</span></div>
          <div class="inst-sub" style="margin-top:4px">Sat. ${d.sat!==null?d.sat.toFixed(1):'—'}/5 · Volver\u00eda ${d.vol!==null?Math.round(d.vol)+'%':'—'}</div>
          <div class="inst-sub">${d.n} respuestas</div>
          <div class="nps-bar" style="margin-top:8px">
            <div class="b-p" style="width:${d.pPct}%"></div>
            <div class="b-n" style="width:${d.nPct}%"></div>
            <div class="b-d" style="width:${d.dPct}%"></div>
          </div>
          <div class="nps-legend" style="margin-top:4px">
            <span style="color:#93C049">${d.pPct}% prom.</span>
            <span style="color:#F28E35">${d.nPct}% neu.</span>
            <span style="color:#D8162D">${d.dPct}% det.</span>
          </div>
        </div>`;}).join('')}
    </div>

    <div class="charts-row">
      <div class="card">
        <h3>Composici\u00f3n NPS por instancia</h3>
        <div class="legend">
          <span><span class="sq" style="background:#93C049"></span>Promotores (9-10)</span>
          <span><span class="sq" style="background:#F28E35"></span>Neutros (7-8)</span>
          <span><span class="sq" style="background:#D8162D"></span>Detractores (0-6)</span>
        </div>
        <div style="position:relative;height:${hInst}px"><canvas id="cNPSInst" role="img" aria-label="NPS por instancia"></canvas></div>
      </div>
      <div class="card">
        <h3>Satisfacci\u00f3n media por instancia</h3>
        <div class="legend"><span><span class="sq" style="background:#D8162D"></span>Escala 1\u20135</span></div>
        <div style="position:relative;height:${hInst}px"><canvas id="cSatInst" role="img" aria-label="Satisfacci\u00f3n por instancia"></canvas></div>
      </div>
    </div>

    <div class="section-title">Por colegio</div>
    <div class="card" style="margin-bottom:16px">
      <table class="school-table">
        <thead><tr><th>Colegio</th><th>NPS</th><th>Categor\u00eda</th><th>Sat. gral.</th><th>Volver\u00eda</th><th>Resp.</th></tr></thead>
        <tbody>
          ${schoolSet.map(c=>{const d=bySchool[c];return`
            <tr>
              <td style="font-weight:500">${c}</td>
              <td style="color:${npsColor(d.nps)};font-weight:600">${d.nps!==null?d.nps:'—'}</td>
              <td><span class="${pillCls(d.nps)}">${npsLabel(d.nps)}</span></td>
              <td>${d.sat!==null?d.sat.toFixed(1)+' / 5':'—'}</td>
              <td>${d.vol!==null?Math.round(d.vol)+'%':'—'}</td>
              <td style="color:#999">${d.n}</td>
            </tr>`;}).join('')}
        </tbody>
      </table>
    </div>

    
  ` + cursoTableHtml + dimsHtml + aiHtml;

  mkChart('cNPSInst','bar',{
    labels: instKeys,
    datasets: [
      {label:'Promotores',  data:instKeys.map(k=>byInst[k].pPct), backgroundColor:'#93C049'},
      {label:'Neutros',     data:instKeys.map(k=>byInst[k].nPct), backgroundColor:'#F28E35'},
      {label:'Detractores', data:instKeys.map(k=>byInst[k].dPct), backgroundColor:'#D8162D'}
    ]
  },{
    indexAxis:'y', responsive:true, maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{x:{stacked:true,max:100,ticks:{callback:v=>v+'%'}},y:{stacked:true}}
  });

  mkChart('cSatInst','bar',{
    labels: instKeys,
    datasets:[{label:'Satisfacci\u00f3n media', data:instKeys.map(k=>byInst[k].sat!==null?parseFloat(byInst[k].sat.toFixed(2)):null), backgroundColor:instKeys.map(k=>byInst[k].color)}]
  },{
    indexAxis:'y', responsive:true, maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{x:{min:0,max:5},y:{}}
  });

}

loadAll();
</script>
</body>
</html>
